 <!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Checking In 😏</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <main class="container">
            <h1>Checking In 😏</h1>
            <form id="studyForm" class="form-card">
                <div id="stepName" class="step">
                    <label for="name">Your name</label>
                    <input type="text" id="name" name="name" placeholder="What should I call you?" required>
                    <button type="button" id="nextButton">Hit me</button>
                </div>

                <div id="stepHours" class="step hidden">
                    <p id="namePrompt" class="step-text"></p>
                    <label for="hours">Hours studied today</label>
                    <input type="number" id="hours" name="hours" min="0" step="0.5" placeholder="e.g. 3.5" required>
                    <button type="button" id="submitButton">Enter</button>
                </div>
            </form>
            <div id="message" class="message"></div>
            <div class="sparkle sparkle-1"></div>
            <div class="sparkle sparkle-2"></div>
            <div class="sparkle sparkle-3"></div>
        </main>
        <script src="script.js"></script>
    </body>
</html>
